<div class="lang-switch">
  {% if page.lang == 'en' %}
  <a href="{{ page.url | remove: '/en' | relative_url }}" class="lang-item"
    >🇰🇷 KO</a
  >
  <span class="lang-item active">🇺🇸 EN</span>
  {% else %}
  <span class="lang-item active">🇰🇷 KO</span>
  <a href="{{ '/en' | append: page.url | relative_url }}" class="lang-item"
    >🇺🇸 EN</a
  >
  {% endif %}
</div>
